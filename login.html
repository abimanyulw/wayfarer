<!DOCTYPE html>
<html lang="id">
<head>
    <title>Login - Wayfarer</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Playful Palette */
            --bg-main: #FFF8F0;
            --bg-card: #FFFFFF;

            --coral: #FF6B6B;
            --teal: #4ECDC4;
            --purple: #A06CD5;
            --yellow: #FFE66D;
            --mint: #95E1D3;
            --pink: #FF8FAB;
            --sky: #74B9FF;

            --outline: #2D3436;
            --outline-light: #636E72;
            --text-dark: #2D3436;
            --text-muted: #636E72;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Playful Background */
        .ambient {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .ambient::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-color: #FFF8F0;
            animation: bgFloat 30s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(2%, 1%) rotate(1deg); }
        }

        /* Floating Shapes */
        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.4;
            animation: shapeFloat 20s ease-in-out infinite;
        }

        .shape-1 {
            width: 60px;
            height: 60px;
            border: 4px solid var(--coral);
            top: 10%;
            left: 10%;
        }

        .shape-2 {
            width: 40px;
            height: 40px;
            background: var(--teal);
            top: 20%;
            right: 15%;
            animation-delay: -5s;
        }

        .shape-3 {
            width: 70px;
            height: 70px;
            border: 4px solid var(--purple);
            bottom: 15%;
            left: 8%;
            animation-delay: -10s;
        }

        .shape-4 {
            width: 30px;
            height: 30px;
            background: var(--yellow);
            bottom: 25%;
            right: 10%;
            animation-delay: -15s;
        }

        @keyframes shapeFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(15deg); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 3px solid var(--outline);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--outline);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            position: relative;
            padding-bottom: 5px;
        }

        .header h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: var(--teal); /* Warna beda untuk Login */
            z-index: -1;
            border-radius: 4px;
            opacity: 0.7;
        }

        /* Form Elements */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-family: 'Fredoka', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: var(--text-dark);
            font-weight: 600;
        }

        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 14px 18px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-dark);
            background: var(--bg-main);
            border: 3px solid var(--outline);
            border-radius: 12px;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            background: white;
            border-color: var(--purple);
            transform: translateY(-2px);
            box-shadow: 0 4px 0 var(--outline-light);
        }

        /* Button */
        .btn-main {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            background: var(--teal); /* Warna Teal untuk Login */
            color: white;
            border: 3px solid var(--outline);
            border-radius: 16px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 5px 0 var(--outline);
            transition: all 0.1s ease;
            text-transform: uppercase;
        }

        .btn-main:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 var(--outline);
        }

        .btn-main:hover {
            background: #3ba89f;
        }

        /* Footer Link */
        .footer-text {
            text-align: center;
            margin-top: 25px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .footer-text a {
            color: var(--coral);
            text-decoration: none;
            font-weight: 900;
            border-bottom: 2px solid var(--coral);
            transition: all 0.2s;
        }

        .footer-text a:hover {
            color: var(--purple);
            border-color: var(--purple);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            .header h1 {
                font-size: 1.6rem;
            }
            .shape { display: none; }
        }
    </style>
</head>
<body>

    <div class="ambient">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>Login</h1>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>Email</label>
                <input id="email" type="email" placeholder="email@example.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input id="password" type="password" placeholder="Masukkan password" required>
            </div>

            <button type="submit" class="btn-main">Masuk</button>
        </form>

       
    </div>

    <script type="module">
        // Import Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js"
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js"

        const firebaseConfig = {
            apiKey: "AIzaSyDFPTu4Md7Zvy4618xVT_30e96k1oC8EIk",
            authDomain: "arise-63f67.firebaseapp.com",
            databaseURL: "https://arise-63f67-default-rtdb.firebaseio.com",
            projectId: "arise-63f67",
            storageBucket: "arise-63f67.firebasestorage.app",
            messagingSenderId: "847026490456",
            appId: "1:847026490456:web:8b5475238f1f35d1918e2d",
            measurementId: "G-K4B4PZDFJF"
        }

        const app = initializeApp(firebaseConfig)
        const auth = getAuth(app)

        // 1. Cek State Auth: Jika sudah login, langsung lempar ke index.html
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "index.html"
            }
        })

        // 2. Fungsi Login
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault()

            const email = document.getElementById("email").value
            const password = document.getElementById("password").value

            try {
                await signInWithEmailAndPassword(auth, email, password)
                
                alert("Login berhasil!")
                // Redirect manual (jika onAuthStateChanged tidak langsung trigger)
                window.location.href = "index.html"

            } catch(err) {
                alert("Error: " + err.message)
            }
        })
    </script>

</body>
</html>
