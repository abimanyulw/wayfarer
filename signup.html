<!DOCTYPE html>
<html lang="id">
<head>
    <title>Signup - Wayfarer</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* (CSS sama dengan yang kamu kirim, dipertahankan) */
        :root {
            /* Playful Palette */
            --bg-main: #FFF8F0;
            --bg-card: #FFFFFF;

            --coral: #FF6B6B;
            --teal: #4ECDC4;
            --purple: #A06CD5;
            --yellow: #FFE66D;
            --mint: #95E1D3;
            --pink: #FF8FAB;
            --sky: #74B9FF;

            --outline: #2D3436;
            --outline-light: #636E72;
            --text-dark: #2D3436;
            --text-muted: #636E72;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
        }

        .ambient { position: fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
        .ambient::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%;
            background:
                radial-gradient(circle at 20% 30%, rgba(255, 107, 107, 0.15) 0%, transparent 25%),
                radial-gradient(circle at 80% 20%, rgba(78, 205, 196, 0.15) 0%, transparent 25%),
                radial-gradient(circle at 40% 80%, rgba(160, 108, 213, 0.15) 0%, transparent 25%);
            animation: bgFloat 30s ease-in-out infinite;
        }
        @keyframes bgFloat { 0%,100%{transform:translate(0,0) rotate(0deg);}50%{transform:translate(2%,1%) rotate(1deg);} }

        .shape{ position:absolute; border-radius:50%; opacity:0.4; animation:shapeFloat 20s ease-in-out infinite;}
        .shape-1{ width:60px;height:60px;border:4px solid var(--coral); top:10%; left:10%; }
        .shape-2{ width:40px;height:40px;background:var(--teal); top:20%; right:15%; animation-delay:-5s; }
        .shape-3{ width:70px;height:70px;border:4px solid var(--purple); bottom:15%; left:8%; animation-delay:-10s; }
        .shape-4{ width:30px;height:30px;background:var(--yellow); bottom:25%; right:10%; animation-delay:-15s; }
        @keyframes shapeFloat { 0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-20px) rotate(15deg);} }

        .container { position:relative; z-index:10; width:100%; max-width:420px; background:rgba(255,255,255,0.9);
            backdrop-filter: blur(10px); border:3px solid var(--outline); border-radius:24px; padding:30px;
            box-shadow:0 10px 0 rgba(0,0,0,0.1);
        }
        .header { text-align:center; margin-bottom:30px; }
        .header h1 { font-family:'Fredoka',sans-serif; font-size:2rem; font-weight:700; color:var(--outline);
            text-transform:uppercase; letter-spacing:2px; display:inline-block; position:relative; padding-bottom:5px;
        }
        .header h1::after { content:''; position:absolute; bottom:0; left:0; right:0; height:8px; background:var(--yellow);
            z-index:-1; border-radius:4px; opacity:0.7;
        }

        .input-group { margin-bottom:16px; }
        .input-group label { display:block; font-family:'Fredoka',sans-serif; font-size:0.9rem; margin-bottom:6px;
            color:var(--text-dark); font-weight:600;
        }
        input[type="text"], input[type="password"], input[type="email"] {
            width:100%; padding:14px 18px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700;
            color:var(--text-dark); background:var(--bg-main); border:3px solid var(--outline); border-radius:12px;
            outline:none; transition: all 0.2s ease;
        }
        input:focus { background:white; border-color:var(--purple); transform:translateY(-2px); box-shadow:0 4px 0 var(--outline-light); }

        .btn-main { width:100%; padding:16px; margin-top:10px; background:var(--coral); color:white; border:3px solid var(--outline);
            border-radius:16px; font-family:'Fredoka',sans-serif; font-size:1.2rem; font-weight:700; letter-spacing:1px;
            cursor:pointer; box-shadow:0 5px 0 var(--outline); transition: all 0.1s ease; text-transform:uppercase;
        }
        .btn-main:active { transform:translateY(4px); box-shadow:0 1px 0 var(--outline); }
        .btn-main:hover { background:#ff5252; }

        .footer-text { text-align:center; margin-top:25px; font-weight:700; color:var(--text-muted); }
        .footer-text a { color:var(--teal); text-decoration:none; font-weight:900; border-bottom:2px solid var(--teal); transition:all 0.2s; }
        .footer-text a:hover { color:var(--purple); border-color:var(--purple); }

        @media (max-width:480px) { .container{padding:20px;} .header h1{font-size:1.6rem;} .shape{display:none;} }
    </style>
</head>
<body>
<div class="ambient">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
</div>

<div class="container">
    <div class="header">
        <h1>Signup</h1>
    </div>

    <form id="signupForm">
        <div class="input-group">
            <label>Nama Lengkap</label>
            <input id="name" type="text" placeholder="Masukkan Nama" required>
        </div>

        <div class="input-group">
            <label>Booking ID</label>
            <input id="booking" type="text" placeholder="Kode Booking" required>
        </div>

        <div style="display: flex; gap: 15px;">
            <div class="input-group" style="flex: 1;">
                <label>Tipe Traveler</label>
                <input id="traveler" type="text" placeholder="Ex: Dewasa" required>
            </div>
            <div class="input-group" style="flex: 1;">
                <label>No. Kursi</label>
                <input id="seat" type="text" placeholder="Ex: 12A" required>
            </div>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input id="email" type="email" placeholder="email@example.com" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input id="password" type="password" placeholder="Minimal 6 karakter" required>
        </div>

        <button type="submit" class="btn-main">Daftar Sekarang</button>
    </form>

    <p class="footer-text">Sudah punya akun? <a href="login.html">Login di sini</a></p>
</div>

<script type="module">
    // Firebase imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDFPTu4Md7Zvy4618xVT_30e96k1oC8EIk",
        authDomain: "arise-63f67.firebaseapp.com",
        databaseURL: "https://arise-63f67-default-rtdb.firebaseio.com",
        projectId: "arise-63f67",
        storageBucket: "arise-63f67.firebasestorage.app",
        messagingSenderId: "847026490456",
        appId: "1:847026490456:web:8b5475238f1f35d1918e2d",
        measurementId: "G-K4B4PZDFJF"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // Helper: sleep
    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    // Robust write with retries + read-back verification
    async function writeUserDataWithRetry(uid, data, maxAttempts = 5) {
        const userRef = ref(db, "users/" + uid);

        let attempt = 0;
        let delay = 400; // ms initial backoff
        while (attempt < maxAttempts) {
            attempt++;
            try {
                console.log(`[signup] attempt ${attempt} - writing user data...`);
                await set(userRef, data); // attempt write
                // verify: read back once
                await sleep(250); // small pause to let write propagate
                const snap = await get(userRef);
                if (snap && snap.exists()) {
                    const val = snap.val();
                    // simple sanity check: ensure name or created_at exists
                    if (val && (val.name === data.name || Boolean(val.created_at))) {
                        console.log('[signup] write verified on attempt', attempt);
                        return { ok: true, data: val };
                    }
                }
                // if verification failed, throw to trigger retry
                throw new Error('verification_failed');
            } catch (err) {
                console.warn(`[signup] write attempt ${attempt} failed:`, err && err.message ? err.message : err);
                if (attempt >= maxAttempts) {
                    return { ok: false, error: err };
                }
                // backoff then retry
                await sleep(delay);
                delay *= 2;
            }
        }
        return { ok: false, error: new Error('max_attempts_reached') };
    }

    // onAuthStateChanged: redirect if already logged in (but only if not currently creating data)
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // If there is a creating flag, allow flow to finish (don't hijack)
            const creating = sessionStorage.getItem('wayfarer_creating_user');
            if (!creating) {
                window.location.href = "index.html";
            } else {
                // still creating: wait for process to finish
                console.log('[signup] user is authenticated but creating flag present, waiting for DB write to finish');
            }
        }
    });

    document.getElementById("signupForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const name = document.getElementById("name").value.trim();
        const booking = document.getElementById("booking").value.trim();
        const traveler = document.getElementById("traveler").value.trim();
        const seat = document.getElementById("seat").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!name || !booking || !traveler || !seat || !email || !password) {
            alert('Lengkapi semua field terlebih dahulu.');
            return;
        }

        // mark creating flag so index.html (or other pages) can decide to wait if needed
        sessionStorage.setItem('wayfarer_creating_user', '1');

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;
            const uid = user.uid;
            console.log('[signup] created auth user uid=', uid);

            // Build user object to write
            const newUser = {
                name: name,
                email: email,
                booking_id: booking,
                traveler_type: traveler,
                seat: seat,
                traits: [],
                profile_photo: "",
                description: "",
                created_at: Date.now(),
                // game_progress default
                game_progress: {
                    quiz: 0,
                    puzzle: 0,
                    memory: 0,
                    wordhunt: 0,
                    trivia: 0,
                    adventure: 0
                }
            };

            // Try writing with retry and verification
            const result = await writeUserDataWithRetry(uid, newUser, 5);
            if (!result.ok) {
                console.error('[signup] failed to save user data after retries:', result.error);
                sessionStorage.removeItem('wayfarer_creating_user');
                alert('Gagal menyimpan data akun ke server. Coba lagi nanti. (' + (result.error && result.error.message ? result.error.message : 'unknown') + ')');
                return;
            }

            // Good — data saved
            console.log('[signup] user data saved:', result.data);

            // clear creating flag
            sessionStorage.removeItem('wayfarer_creating_user');

            alert("Signup berhasil! Anda akan diarahkan ke halaman utama.");
            window.location.href = "index.html";

        } catch (err) {
            // remove creating flag on error
            sessionStorage.removeItem('wayfarer_creating_user');
            console.error('[signup] createUser error', err);
            alert("Error saat membuat akun: " + (err && err.message ? err.message : String(err)));
        }
    });
</script>
</body>
</html>
